services:
  redis:
    image: redis:alpine
    container_name: agent-redis
    restart: always
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M

  ollama:
    image: ollama/ollama:latest
    container_name: agent-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 4G
        reservations:
          cpus: '1.5'
          memory: 2G

  whoogle:
    image: benbusby/whoogle-search:latest
    container_name: agent-whoogle
    restart: always
    ports:
      - "5010:5000"
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M

  agent-api:
    build: .
    container_name: agent-api
    working_dir: /app_host
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app_host
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=mysql+pymysql://root:@host.docker.internal:3306/agent_db
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5-coder:1.5b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - AGENT_API_KEY=local_developer_secret_key
      - AUTO_PULL_MODEL=True
      - WHOOGLE_URL=http://whoogle:5000
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_started
      whoogle:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1.5G

volumes:
  ollama_data:
